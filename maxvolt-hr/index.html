<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#4F46E5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#080B14" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maxvolt HR" />

    <!-- Icons -->
    <link rel="icon"             type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest"         href="/manifest.json" />

    <!-- SEO -->
    <meta name="description" content="Maxvolt Energy HR Management Portal — attendance, payroll, leave, and more." />
    <meta name="application-name" content="Maxvolt HR" />

    <title>Maxvolt HR Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA / offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] registration failed', err));
        });
      }
    </script>
  </body>
</html>
